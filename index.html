<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゆうたのさいと</title>
<style>
body {
  background: linear-gradient(45deg, #ff00cc, #3333ff);
  color: white;
  font-family: "Comic Sans MS", cursive;
  text-align: center;
  margin: 0;
}

h1 {
  font-size: 60px;
  margin-top: 30px;
  animation: spin 3s infinite linear;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

button {
  padding: 15px;
  font-size: 20px;
  margin: 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: yellow;
  color: black;
}

#msg {
  font-size: 25px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>ゆうたのさいと</h1>

<p>ようこそｗｗｗここは世界一どうでもいいサイトです😂</p>

<button onclick="roast()">押すなよ？絶対押すなよ？</button>

<div id="msg"></div>

<script>
function roast() {
  const msgs = [
    "お前押したなｗｗｗ",
    "ヒマ人確定😂",
    "ここ押すやつIQ3くらいらしいぞ",
    "まだ見てるの？草",
    "Wi-Fi無駄遣いしてて草",
    "このサイト見つけた時点で勝ち組ではないｗ",
    "押すなって言ったよな？？？？"
  ];
  
  const random = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById("msg").innerText = random;
}
</script>

<footer style="position:fixed; bottom:0; width:100%; font-size:12px;">
  チャッピー作（天才AI）
</footer>

</body>
</html>
